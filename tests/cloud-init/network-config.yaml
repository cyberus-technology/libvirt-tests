# Please keep in sync with documentation in networks.md!
# Configures the VM to connect via `tap1` in networks.md
version: 2
ethernets:
  mynet:
    match:
      macaddress: "52:54:00:e5:b8:01"
    set-name: eth0
    dhcp4: false
    addresses:
      - 192.168.1.2/24
    routes:
      - to: default
        via: 192.168.1.1
